name: Bug report
description: Reportar un fallo del sistema
body:
  - type: input
    id: repro
    attributes:
      label: Pasos para reproducir
      description: Cómo llegamos al fallo
      placeholder: "1. ... 2. ..."
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Comportamiento esperado
      placeholder: "Debería ..."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs o evidencia
      placeholder: "Pegar logs, screenshots o payloads útiles"
    validations:
      required: false
