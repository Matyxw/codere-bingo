name: Pull request checklist
description: Checklist mínima para merge
body:
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Tests pasan
          required: true
        - label: Lint pasa
          required: true
        - label: Doc actualizada
          required: true
        - label: No hay secrets en código
          required: true
        - label: Cumple decision gate
          required: true
