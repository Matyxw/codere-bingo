name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm --prefix frontend ci
      - run: npm --prefix frontend run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-staging
          path: frontend/dist/
      - run: echo "Deploy backend to staging placeholder"
      - run: echo "Deploy frontend dist to staging placeholder"
