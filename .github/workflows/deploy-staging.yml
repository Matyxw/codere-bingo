name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - run: npm --prefix frontend ci
      - run: npm --prefix frontend run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-staging
          path: frontend/dist/
          retention-days: 7
      - name: Deploy backend to staging
        run: |
          echo "Replace this step with your staging deploy command"
          echo "Examples: ssh deploy, fly deploy, render deploy, docker push"
      - name: Deploy frontend to staging
        run: |
          echo "Replace this step with your frontend deploy command"
          echo "Examples: rsync dist/, S3 sync, Vercel deploy"
      - name: Health check staging
        run: |
          echo "Replace with your staging health check URL"
          echo "curl -f https://staging.example.com/health || exit 1"
