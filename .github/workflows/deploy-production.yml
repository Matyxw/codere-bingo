name: Deploy Production

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - run: npm --prefix frontend ci
      - run: npm --prefix frontend run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-production
          path: frontend/dist/
          retention-days: 30
      - name: Deploy backend to production
        run: |
          echo "Replace this step with your production deploy command"
          echo "Examples: blue-green deploy, canary, rolling update"
      - name: Deploy frontend to production
        run: |
          echo "Replace this step with your frontend deploy command"
          echo "Examples: CDN invalidation, S3 sync, Vercel promote"
      - name: Health check production
        run: |
          echo "Replace with your production health check URL"
          echo "curl -f https://codere-bingo.example.com/health || exit 1"
      - name: Slack notification
        if: always()
        run: |
          echo "Replace with your notification webhook"
          echo "Notify team on deploy success/failure"
    outputs:
      deployment_version: ${{ github.ref_name }}
      deployment_sha: ${{ github.sha }}
